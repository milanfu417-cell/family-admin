<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Family Admin</h1>
    <p class="subtitle" id="today"></p>
  </header>

  <main class="dashboard">
    <section class="card" id="card-calendar">
      <h2>📅 Calendar</h2>
      <p>No upcoming events yet.</p>
    </section>

    <section class="card" id="card-chores">
      <h2>🧹 Chores</h2>
      <ul class="list" id="chores-list">
        <li>Take out the trash</li>
        <li>Load the dishwasher</li>
      </ul>
    </section>

    <section class="card" id="card-shopping">
      <h2>🛒 Shopping List</h2>
      <ul class="list" id="shopping-list">
        <li>Milk</li>
        <li>Eggs</li>
      </ul>
    </section>

    <section class="card" id="card-meals">
      <h2>🍽️ Meal Plan</h2>
      <p>Nothing planned for today.</p>
    </section>

    <section class="card" id="card-budget">
      <h2>💰 Budget</h2>
      <p>Track shared family expenses here.</p>
    </section>
  </main>

  <footer class="app-footer">
    <p>Family Admin Dashboard</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
