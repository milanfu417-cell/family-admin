<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Family Admin</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6366f1" />

  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Family Admin" />

  <link rel="stylesheet" href="style.css?v=9" />
</head>
<body>
  <header class="app-header">
    <h1>Family Admin <span class="version-tag">v2.1 · Polish</span></h1>
    <p class="subtitle" id="today"></p>
  </header>

  <main class="dashboard-tiles">
    <section class="tile tile-wide" id="tile-calendar">
      <div class="tile-heading">
        <button type="button" class="tile-collapse-toggle" id="calendar-toggle" aria-expanded="false" aria-controls="calendar-body">
          <h2>📅 Calendar Sync</h2>
          <span class="tile-collapse-chevron" aria-hidden="true">⌄</span>
        </button>
        <p class="sync-meta" id="calendar-sync-meta">Not connected yet.</p>
      </div>

      <div class="calendar-body" id="calendar-body">
        <div class="calendar-header">
          <button type="button" class="calendar-nav-btn" id="cal-prev" aria-label="Previous month">‹</button>
          <span id="calendar-month-label"></span>
          <button type="button" class="calendar-nav-btn" id="cal-next" aria-label="Next month">›</button>
        </div>

        <div class="calendar-weekdays">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>

        <div class="calendar-unscheduled" id="calendar-unscheduled"></div>
      </div>
    </section>

    <section class="tile" id="tile-chores">
      <h2>🧹 Chores</h2>
      <ul class="tile-list" id="chores-list"></ul>
      <button type="button" class="inline-add-toggle" id="chore-add-toggle">+ Add</button>
      <form class="inline-add-form hidden" id="chore-add-form">
        <input type="text" id="chore-add-input" placeholder="New chore" required />
        <button type="submit" class="btn-icon" aria-label="Save chore">✓</button>
      </form>
    </section>

    <section class="tile" id="tile-shopping">
      <h2>🛒 Shopping List</h2>
      <ul class="tile-list" id="shopping-list"></ul>
      <button type="button" class="inline-add-toggle" id="shopping-add-toggle">+ Add</button>
      <form class="inline-add-form hidden" id="shopping-add-form">
        <input type="text" id="shopping-add-input" placeholder="New item" required />
        <button type="submit" class="btn-icon" aria-label="Save item">✓</button>
      </form>
    </section>

    <section class="tile" id="tile-meals">
      <h2>🍽️ Meal Plan</h2>
      <ul class="tile-list" id="meal-list"></ul>
      <button type="button" class="inline-add-toggle" id="meal-add-toggle">+ Add</button>
      <form class="inline-add-form hidden" id="meal-add-form">
        <input type="text" id="meal-add-input" placeholder="e.g. Tue: Tacos" required />
        <button type="submit" class="btn-icon" aria-label="Save meal">✓</button>
      </form>
    </section>

    <section class="tile" id="tile-budget">
      <h2>💰 Budget</h2>
      <ul class="tile-list" id="budget-list"></ul>
      <button type="button" class="inline-add-toggle" id="budget-add-toggle">+ Add</button>
      <form class="inline-add-form hidden" id="budget-add-form">
        <input type="text" id="budget-add-input" placeholder="e.g. Groceries: $120" required />
        <button type="submit" class="btn-icon" aria-label="Save budget item">✓</button>
      </form>
    </section>
  </main>

  <footer class="app-footer">
    <p>Family Admin Dashboard</p>
  </footer>

  <button type="button" class="fab" id="fab-add" aria-label="Add calendar event">+</button>

  <div class="sheet-overlay" id="sheet-overlay">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-form-title">
      <div class="sheet-handle"></div>

      <form id="sheet-form-event">
        <h2 id="sheet-form-title">📅 Add Calendar Event</h2>
        <label class="form-row">
          Title
          <input type="text" id="sheet-event-title" required />
        </label>
        <div class="form-row-split">
          <label class="form-row">
            Date
            <input type="date" id="sheet-event-date" />
          </label>
          <label class="form-row">
            Time
            <input type="time" id="sheet-event-time" />
          </label>
        </div>
        <div class="sheet-actions">
          <button type="button" class="btn-ghost" id="sheet-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Add Event</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js?v=9"></script>
</body>
</html>
